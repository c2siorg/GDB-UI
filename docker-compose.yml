version: "3"
services:
  gdbui_server:
    build:
      dockerfile: DockerFile.dev
      context: ./gdbui_server
    volumes:
      - ./gdbui_server:/app
    ports:
      - "10000:10000"
    expose:
      - 10000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:10000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  webapp:
    build:
      dockerfile: DockerFile.dev
      context: ./webapp
    volumes:
      - /app/node_modules
      - ./webapp:/app
    ports:
      - "5173:5173"
    expose:
      - 5173
    depends_on:
      gdbui_server:
        condition: service_healthy
