services:
  gdbui_server:
    build:
      context: ./gdbui_server
      dockerfile: Dockerfile
    ports:
      - "10000:10000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  webapp:
    build:
      context: ./webapp
      dockerfile: DockerFile.dev
      args:
        - VITE_API_BASE_URL=http://gdbui_server:10000
    ports:
      - "5173:5173"
    restart: always
    depends_on:
      gdbui_server:
        condition: service_healthy
