name: Run Tests on Pull Request

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Fetch pull request changes
        run: |
          git fetch origin +refs/pull/${{ github.event.pull_request.number }}/merge:pr
          git checkout pr

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: gdbui_server/requirements.txt

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: gdb
          version: 1.0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r gdbui_server/requirements.txt

      - name: Run tests on changes
        run: |
          python -m unittest discover -s gdbui_server -p 'flask_test.py'
          python -m unittest discover -s gdbui_server/tests -p 'test_*.py'
